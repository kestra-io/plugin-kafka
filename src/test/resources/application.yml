kestra:
  repository:
    type: memory
  queue:
    type: memory
  storage:
    type: local
    local:
      base-path: /tmp/unittest
  server:
    liveness:
      enabled: false

worker:
  controllers:
    type: STATIC
    static:
      endpoints:
        - host: localhost

kafka:
  bootstrap: localhost:9092
  registry: http://localhost:8085
